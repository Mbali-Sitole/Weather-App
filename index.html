<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1cb5e0" />
    <body>
      <div class="container">
        <h1 class="title">🌤Weather App</h1>
        <div class="search-box">
          <input type="text" id="city-input" placeholder="Enter a city name..."/>
          <button id="search-btn">Search</button>
        </div>
      </div>
      
      <div class="weather-card" id="weather-card">
        <h2 id="city-name">Gauteng</h2>
        <img id="weather-icon" src="" alt="weather icon" />
        <p id="temperature">19°C</p>
        <button id="toggle-unit">Switch to °F</button>
        <p id="description">Clear skies</p>
        <p id="humidity">Humidity: 30%</p>
        <p id="wind">Wind: 40km/h</p>
        <p id="feels-like">Feels like: 14°C</p>
      </div>
      <script src="script.js"></script>
        
    </body>
</html>
